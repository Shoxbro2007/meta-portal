<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Portal 2.0 | Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient-bg"></div>

    <header class="top-bar">
        <div class="logo">META PORTAL <span class="badge">2.0</span></div>
        <div class="controls">
            <button id="zenModeBtn" class="icon-btn" title="Режим Дзен">🧘</button>
            <button id="themeBtn" class="icon-btn" title="Тема">🌓</button>
            <div class="user-score">✨ <span id="scoreVal">0</span></div>
        </div>
    </header>

    <main id="chatCanvas" class="chat-canvas">
        <div class="empty-state" id="emptyState">
            <h2>Поток сознания</h2>
            <p>Напиши что-нибудь, чтобы запустить волну...</p>
        </div>
    </main>

    <footer class="input-dock">
        <div class="input-wrapper">
            <button id="voiceBtn" class="action-btn voice">🎤</button>
            <input type="text" id="msgInput" placeholder="Мысль вслух..." autocomplete="off">
            <button id="sendBtn" class="action-btn send">➤</button>
        </div>
        <div id="voiceVisualizer" class="hidden">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <span>Запись... (отпустите для отправки)</span>
        </div>
    </footer>

    <div id="toastContainer"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
